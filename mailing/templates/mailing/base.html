<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="description" content="Mailing list server for blog.evanchen.cc">
        <meta name="keywords" content="evan chen, blog, mailing list">
        <title>{{ page_title|default:"Evan's mailing list" }}</title>
        <style type="text/css">
            main {
                max-width: 512px;
                margin: 0 auto;
            }
            #foot-divider {
                margin-top: 30px;
            }
            body {
                background-color: #f9fffa;
            }
        </style>
        {% block extra_css %}
        {% endblock extra_css %}
        <link rel="apple-touch-icon"
              sizes="180x180"
              href="//web.evanchen.cc/static/icons/apple-touch-icon.png" />
        <link rel="icon"
              type="image/png"
              href="//web.evanchen.cc/static/icons/favicon-32x32.png"
              sizes="32x32" />
        <link rel="icon"
              type="image/png"
              href="//web.evanchen.cc/static/icons/favicon-16x16.png"
              sizes="16x16" />
        <link rel="manifest" href="//web.evanchen.cc/static/icons/manifest.json" />
        <link rel="mask-icon"
              href="//web.evanchen.cc/static/icons/safari-pinned-tab.svg"
              color="#5bbad5" />
        <link rel="shortcut icon" href="//web.evanchen.cc/static/icons/favicon.ico" />
        <meta name="msapplication-config"
              content="//web.evanchen.cc/static/icons/browserconfig.xml" />
    </head>
    <body>
        <main>
            {% if page_title %}<h1>{{ page_title }}</h1>{% endif %}
            {% block content %}
            {% endblock content %}
            {% block back_link %}
                <hr id="foot-divider" />
                <p>
                    <a href="{% url 'index' %}">Back</a>
                </p>
            {% endblock back_link %}
        </main>
    </body>
</html>
